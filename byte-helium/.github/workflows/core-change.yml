name: Core Changes

on:
  pull_request:
    types: [opened, edited, ready_for_review, synchronize]

jobs:
  core-change:
    runs-on: ubuntu-latest

    env:
      CORE_DIRECTORIES: |
        apps/expo-app-template/
        apps/web-app-template/
        apps/web-app-template-e2e/
        apps/shared-native/
        apps/shared-web/
        libs/core/
        libs/dsc-react-native/
        libs/dsc-react-web/
        libs/native-core-framework/
        libs/native-core-modules/
        libs/native-shared/
        libs/web-core-framework/
        libs/web-core-modules/
        libs/web-shared/
      DESIGN_DIRECTORIES: |
        libs/design-tokens/
        libs/dsc-react-native/
        libs/dsc-react-web/

    steps:
      - name: Generate a token
        id: generate-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.CORE_APP_ID }}
          private-key: ${{ secrets.CORE_APP_KEY }}

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for core changes
        if: ${{ github.event.pull_request.draft == false }}
        run: |
          # Check if PR already has the core-change label
          if gh pr view ${{ github.event.pull_request.number }} --json labels --jq '.labels[].name' | grep -q "core-change"; then
            echo "PR already has core-change label, skipping..."
            exit 0
          fi

          # Convert the core directories list to a usable grep format
          GREP_PATTERN="^($(echo "$CORE_DIRECTORIES" | grep -v '^$' | tr '\n' '|' | sed 's/|$//'))"

          if gh pr diff ${{ github.event.pull_request.number }} --name-only | grep -qE "$GREP_PATTERN"; then
            gh pr edit ${{ github.event.pull_request.number }} --add-reviewer pizzahutuk/product-experience-core-i,pizzahutuk/platform-core-ii
            gh pr comment ${{ github.event.pull_request.number }} --body "The Core team has been added to this PR for visibility because changes to core directories have been detected"
            gh pr edit ${{ github.event.pull_request.number }} --add-label "core-change"
          fi
      - name: Check for design changes
        if: ${{ github.event.pull_request.draft == false }}
        run: |
          # Check if PR already has the design-change label
          if gh pr view ${{ github.event.pull_request.number }} --json labels --jq '.labels[].name' | grep -q "design-system-change"; then
            echo "PR already has design-system-change label, skipping..."
            exit 0
          fi

          # Convert the design directories list to a usable grep format
          GREP_PATTERN="^($(echo "$DESIGN_DIRECTORIES" | grep -v '^$' | tr '\n' '|' | sed 's/|$//'))"

          if gh pr diff ${{ github.event.pull_request.number }} --name-only | grep -qE "$GREP_PATTERN"; then
            gh pr edit ${{ github.event.pull_request.number }} --add-reviewer pizzahutuk/design-system-engineers
            gh pr comment ${{ github.event.pull_request.number }} --body "The Design System Engineers team has been added to this PR for visibility because changes to design directories have been detected"
            gh pr edit ${{ github.event.pull_request.number }} --add-label "design-system-change"
          fi
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
